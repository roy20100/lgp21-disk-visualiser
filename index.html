<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disk Visualiser</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #canvas {
            border: 1px solid black;
            width: 100%;
            max-width: 800px;
            height: 400px;
        }
        .control-panel {
            margin: 10px;
        }
        button, input[type="checkbox"] {
            margin: 5px;
        }
        @media (max-width: 600px) {
            #canvas {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Disk Visualiser</h1>
        <canvas id="canvas"></canvas>
        <div class="control-panel">
            <button id="physical-mode">Physical Mode</button>
            <button id="logical-mode">Logical Mode</button>
            <label><input type="checkbox" id="interleaving-toggle"> Enable Interleaving</label>
            <div id="memory-display">Memory: <span id="memory-value">0</span></div>
            <button id="reset">Reset</button>
        </div>
    </div>
    <script>
        // JS Logic for functionalities (not included for brevity)
    </script>
</body>
</html>
